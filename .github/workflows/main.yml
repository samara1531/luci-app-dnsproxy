name: Build LuCI DNSProxy

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "23.05"
            sdk_url: "https://downloads.openwrt.org/releases/23.05.6/targets/x86/64/openwrt-sdk-23.05.6-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"

          - version: "24.10"
            sdk_url: "https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"

          - version: "25.12"
            sdk_url: "https://downloads.openwrt.org/releases/25.12.2/targets/x86/64/openwrt-sdk-25.12.2-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Free space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo docker system prune -af || true

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y wget rsync build-essential xz-utils zstd git

      # ---------------------------
      # Download SDK
      # ---------------------------
      - name: Download SDK
        run: |
          set -e

          file_name=$(basename "${{ matrix.sdk_url }}")

          wget -O "$file_name" "${{ matrix.sdk_url }}"

          tar -xf "$file_name"

          rm -f *.tar.zst *.tar.xz || true

          mv openwrt-sdk-* sdk

      # ---------------------------
      # Add dnsproxy backend
      # ---------------------------
      - name: Add dnsproxy backend
        run: |
          set -e

          git clone https://github.com/muink/dnsproxy sdk/package/dnsproxy

      # ---------------------------
      # Add LuCI package
      # ---------------------------
      - name: Add LuCI package
        run: |
          set -e

          mkdir -p sdk/package/custom/luci-app-dnsproxy

          cp -r htdocs po root Makefile \
            sdk/package/custom/luci-app-dnsproxy/

      # ---------------------------
      # Update feeds
      # ---------------------------
      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ---------------------------
      # Build
      # ---------------------------
      - name: Build package
        run: |
          cd sdk

          make defconfig

          make package/custom/luci-app-dnsproxy/compile V=s -j1

      # ---------------------------
      # Collect artifacts
      # ---------------------------
      - name: Collect artifacts
        run: |
          mkdir -p out

          find sdk/bin -type f \( -name "*.ipk" -o -name "*.apk" \) \
            -exec cp {} out/ \;

      # ---------------------------
      # Upload
      # ---------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-dnsproxy-${{ matrix.version }}
          path: out/*
