name: Build LuCI ALL packages

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - version: 24.10
            target: x86_64_generic
          - version: 25.12
            target: x86_64_generic

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y rsync build-essential curl tar xz-utils

      - name: Download OpenWrt SDK
        run: |
          set -e

          BASE="https://downloads.openwrt.org/releases/${{ matrix.version }}/targets/x86/${{ matrix.target }}"

          echo "Fetching SDK list from: $BASE"

          SDK=$(curl -s "$BASE/" | grep -oE 'openwrt-sdk-[^"]+x86_64_generic[^"]+\.tar\.xz' | head -n1)

          if [ -z "$SDK" ]; then
            echo "SDK not found!"
            exit 1
          fi

          echo "SDK: $SDK"

          wget "$BASE/$SDK"
          tar -xf "$SDK"
          mv openwrt-sdk-* sdk

      - name: Add custom LuCI feed
        run: |
          mkdir -p sdk/package/custom

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            ./ sdk/package/custom/

      - name: Update feeds (minimal)
        run: |
          cd sdk

          ./scripts/feeds update luci packages
          ./scripts/feeds install -p luci -p packages

      - name: Build LuCI packages
        run: |
          cd sdk
          make package/custom/compile V=s -j$(nproc)

      - name: Collect artifacts
        run: |
          mkdir -p out

          find sdk/bin -type f \( -name "*.ipk" -o -name "*.apk" \) \
            -exec cp {} out/ \;

      - name: Rename packages
        run: |
          set -e

          for f in out/*; do
            base=$(basename "$f")

            # extract architecture (all / noarch / x86_64 etc.)
            arch=$(echo "$base" | sed -E 's/.*_([^_]+)\.(ipk|apk)/\1/')

            version=${{ matrix.version }}

            new="${base%%_*}_${version}_${arch}"

            mv "$f" "out/$new"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-all-${{ matrix.version }}
          path: out/*
