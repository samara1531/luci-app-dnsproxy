name: Build LuCI ALL packages

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "23.05"
            sdk_url: "https://downloads.openwrt.org/releases/23.05.6/targets/x86/64/openwrt-sdk-23.05.6-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"

          - version: "24.10"
            sdk_url: "https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"

          - version: "25.12"
            sdk_url: "https://downloads.openwrt.org/releases/25.12.2/targets/x86/64/openwrt-sdk-25.12.2-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y rsync build-essential zstd wget

      - name: Download SDK
        run: |
          set -e

          echo "Downloading: ${{ matrix.sdk_url }}"
          wget -O sdk.tar.zst "${{ matrix.sdk_url }}"

          unzstd sdk.tar.zst
          tar -xf sdk.tar

          mv openwrt-sdk-* sdk

      - name: Add custom LuCI feed
        run: |
          mkdir -p sdk/package/custom

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            ./ sdk/package/custom/

      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update luci packages
          ./scripts/feeds install -p luci -p packages

      - name: Build LuCI packages
        run: |
          cd sdk
          make package/custom/compile V=s -j$(nproc)

      - name: Collect artifacts
        run: |
          mkdir -p out

          find sdk/bin -type f \( -name "*.ipk" -o -name "*.apk" \) \
            -exec cp {} out/ \;

      - name: Rename packages
        run: |
          set -e

          for f in out/*; do
            base=$(basename "$f")

            arch=$(echo "$base" | sed -E 's/.*_([^_]+)\.(ipk|apk)/\1/')

            mv "$f" "out/${base%%_*}_${{ matrix.version }}_${arch}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-all-${{ matrix.version }}
          path: out/*
