name: LuCI Light Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "23.05"
            sdk_url: "https://downloads.openwrt.org/releases/23.05.6/targets/x86/64/openwrt-sdk-23.05.6-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"

          - version: "24.10"
            sdk_url: "https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"

          - version: "25.12"
            sdk_url: "https://downloads.openwrt.org/releases/25.12.2/targets/x86/64/openwrt-sdk-25.12.2-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # 💥 FREE DISK SPACE (ВАЖНО)
      - name: Free runner space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc || true
          sudo docker system prune -af || true

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y wget rsync tar xz-utils zstd build-essential

      # 📦 Download SDK (NO PARSING)
      - name: Download SDK
        run: |
          set -e

          URL="${{ matrix.sdk_url }}"
          FILE=$(basename "$URL")

          wget -O "$FILE" "$URL"

          if [[ "$FILE" == *.tar.zst ]]; then
            unzstd "$FILE"
            TAR_FILE="${FILE%.zst}"
            tar -xf "$TAR_FILE"

          elif [[ "$FILE" == *.tar.xz ]]; then
            tar -xJf "$FILE"

          else
            tar -xf "$FILE"
          fi

          mv openwrt-sdk-* sdk

      # 📁 Add your LuCI package ONLY
      - name: Add package
        run: |
          mkdir -p sdk/package/custom

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            ./ sdk/package/custom/

      # 🧠 NO feeds (это главный фикс)
      - name: Prepare build system
        run: |
          cd sdk
          ./scripts/feeds update luci
          ./scripts/feeds install -p luci

      # 🏗️ BUILD (quiet mode!)
      - name: Build package
        run: |
          cd sdk
          make package/custom/compile -j$(nproc)

      # 📦 Collect artifacts
      - name: Collect artifacts
        run: |
          mkdir -p out
          find sdk/bin -type f \( -name "*.ipk" -o -name "*.apk" \) -exec cp {} out/ \;

      # 🏷️ Rename
      - name: Rename
        run: |
          for f in out/*; do
            base=$(basename "$f")
            mv "$f" "out/${base%%_*}_${{ matrix.version }}_${base##*_}"
          done

      # 📤 Upload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: luci-${{ matrix.version }}
          path: out/*
